stages:
  - build
  - deploy

variables:
  NODE_OPTIONS: "--max-old-space-size=1800"

cache:
  key: npm
  paths:
    - node_modules/
    - ~/.npm/

build:
  stage: build
  image: node:22
  tags:
    - flowers-runner
  only:
    - main
  script:
    - npm ci
    - echo "NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL" > .env.production
    - npm run build
  artifacts:
    paths:
      - .next/
      - public/
      - package.json
      - package-lock.json
      - next.config.ts
      - .env.production
    expire_in: 1 week

deploy:
  stage: deploy
  tags:
    - flowers-runner
  only:
    - main
  script:
    - mkdir -p /var/www/moon-flowers
    - cp -rv .next/ public/ package.json package-lock.json next.config.ts .env.production /var/www/moon-flowers/
    - cd /var/www/moon-flowers
    - npm ci --production
    - pm2 restart moon-flowers || pm2 start npm --name moon-flowers -- start
  environment:
    name: production
    url: http://149.154.71.226
